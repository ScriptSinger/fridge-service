name: Deploy to Server

on:
  push:
    branches:
      - main
      - test

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, zip, pdo, curl, openssl
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Create Release Archive
        run: |
          tar -czf release.tar.gz \
            app \
            bootstrap \
            config \
            database \
            docker \
            lang \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            docker-compose.yml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: .

      - name: Setup SSH key and agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Upload Release to Server
        run: |
          scp -o StrictHostKeyChecking=no release.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/release-appliance-repair.tar.gz

      - name: Deploy on Server
        run: |
          ssh -i ~/.ssh/id_appliance_repair ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            cd ~/appliance_repair

            tar -xzf /tmp/release-appliance-repair.tar.gz -C .

            cat > .env << 'ENVFILE'
            ${{ secrets.ENV_FILE }}
            ENVFILE

            docker compose up -d --build --remove-orphans
            docker compose exec php php artisan storage:link
            docker compose exec php php artisan optimize:clear
            docker compose exec php php artisan config:cache
            docker compose exec php php artisan route:cache
            docker compose exec php php artisan view:cache
            docker compose run --rm php php artisan migrate --force
          EOF
