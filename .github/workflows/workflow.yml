name: Deploy to Server

on:
  push:
    branches:
      - main
      - test

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, zip, pdo, curl, openssl
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Create Release Archive
        run: |
          tar -czf release.tar.gz \
            app \
            bootstrap \
            config \
            database \
            docker \
            lang \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            docker-compose.yml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: .

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo Connected!"

      - name: Upload Release to Server
        run: |
          scp -i ~/.ssh/id_ed25519 release.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/release.tar.gz

      - name: Deploy on Server
        run: |
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/id_appliance_repair ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            cd ~/appliance_repair

            tar -xzf /tmp/release-appliance-repair.tar.gz -C .

            printf '%s\n' "${{ secrets.ENV_FILE }}" | tr -d '\r' > .env

            docker compose up -d --build --remove-orphans
            docker compose exec php php artisan storage:link
            docker compose exec php php artisan optimize:clear
            docker compose exec php php artisan config:cache
            docker compose exec php php artisan route:cache
            docker compose exec php php artisan view:cache
            docker compose run --rm php php artisan migrate --force
          EOF
