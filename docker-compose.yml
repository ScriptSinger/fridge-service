services:
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel
      - ufamasters_laravel

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ufamasters_laravel"
      - "traefik.http.routers.archivarius.rule=Host(`service.ufamasters.ru`)"
      - "traefik.http.routers.archivarius.entrypoints=websecure"
      - "traefik.http.routers.archivarius.tls.certresolver=myresolver"

      - "traefik.http.routers.archivarius-insecure.rule=Host(`service.ufamasters.ru`)"
      - "traefik.http.routers.archivarius-insecure.entrypoints=web"
      - "traefik.http.routers.archivarius-insecure.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  php:
    build:
      context: .
      dockerfile: docker/php/php.dockerfile
    user: "${UID}:${GID}"

    volumes:
      - ./:/var/www/html
      - ./docker/php/php-overrides.ini:/usr/local/etc/php/conf.d/php-overrides.ini

    networks:
      - laravel
    # - ufamasters_laravel

  mysql:
    image: mysql:8.0.38-debian
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql

    networks:
      - laravel

  composer:
    build:
      context: .
      dockerfile: docker/composer/composer.dockerfile
    user: "${UID}:${GID}"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html

volumes:
  db_data:

networks:
  ufamasters_laravel:
    external: true

  laravel:
    driver: bridge
